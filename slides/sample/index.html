<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Sample slide deck" />
    <title>Sample Deck</title>
    <link rel="stylesheet" href="../../styles.css" />
  </head>
  <body class="deck-page">
    <a class="back-link" href="../../">← スライド一覧</a>

    <aside class="toc" aria-label="スライド目次">
      <p class="toc-title">目次</p>
      <ol class="toc-list"></ol>
    </aside>

    <main class="deck" aria-live="polite">
      <section class="slide title-slide" data-title="Sample">
        <p class="eyebrow">Example</p>
        <h1>Sample Deck</h1>
        <p class="lead">2枚構成のサンプルスライドです。</p>
      </section>

      <section class="slide" data-title="Next Steps">
        <p class="eyebrow">Guide</p>
        <h2>新しいスライドを追加する</h2>
        <ol>
          <li><code>slides/</code> 以下にフォルダを作成</li>
          <li><code>index.html</code> にスライドを記述</li>
          <li><code>slides/manifest.json</code> に登録</li>
        </ol>
      </section>
    </main>

    <nav class="controls" aria-label="Slide controls">
      <button class="control" type="button" data-action="prev" aria-label="Previous slide">‹</button>
      <span class="counter" aria-label="Slide count">
        <span id="current-slide">1</span>/<span id="total-slides">1</span>
      </span>
      <button class="control" type="button" data-action="next" aria-label="Next slide">›</button>
    </nav>

    <div class="progress" aria-hidden="true">
      <div class="progress-bar"></div>
    </div>

    <script src="../../script.js"></script>
  </body>
</html>
